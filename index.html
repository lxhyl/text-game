<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretext Glyph Storm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      background: #0f0b09;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 166, 79, 0.12), transparent 34%),
        linear-gradient(180deg, #19120d 0%, #0f0b09 58%, #120c09 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: "Menlo", "Consolas", monospace;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
